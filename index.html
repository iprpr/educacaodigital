<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fórum CEJ</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#071225;color:#eaf2ff}
    .wrap{max-width:1100px;margin:0 auto;padding:22px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 18px;border-radius:12px;text-decoration:none;color:#fff;background:#2563eb;font-weight:700;border:none;cursor:pointer}
    .box{margin-top:24px;padding:20px;border:1px solid rgba(96,165,250,.2);border-radius:18px;background:rgba(255,255,255,.04)}
    .erro{color:#fecaca;background:rgba(239,68,68,.12);padding:14px;border-radius:12px;display:none}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:18px}
    .card{padding:18px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(96,165,250,.15)}
    small{color:#9fb2cf}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 id="tituloSite">Fórum CEJ</h1>
        <small id="subtituloSite">Portal escolar</small>
      </div>
      <a id="btnAdmin" class="btn" href="#" target="_blank" rel="noopener">Área restrita</a>
    </div>

    <div id="erroBox" class="erro"></div>

    <div class="box">
      <h2>Banners</h2>
      <div id="banners" class="grid"></div>
    </div>

    <div class="box">
      <h2>Notícias</h2>
      <div id="noticias" class="grid"></div>
    </div>

    <div class="box">
      <h2>Avisos</h2>
      <div id="avisos" class="grid"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyjWALebfzJTxT1KlLtCEr9y-B-oMeBXBOCasshRF3j4NDb6ct98sAuZN6y_cozZyR_4Q/exec';
    const ADMIN_URL = 'https://script.google.com/macros/s/AKfycbxeMFW3kxDbGWoMX1rA3j2UA_5kC4hhd3P7iJbUvF3poxiujiuibtwxOCjHfmQySX6dGg/exec';

    document.getElementById('btnAdmin').href = ADMIN_URL;

    function escapeHtml(text){
      return String(text ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    function showError(msg){
      const box = document.getElementById('erroBox');
      box.style.display = 'block';
      box.textContent = msg;
    }

    function cardHtml(title, text){
      return `<div class="card"><strong>${escapeHtml(title || 'Sem título')}</strong><p>${escapeHtml(text || '')}</p></div>`;
    }

    async function carregarSite(){
      try{
        const resp = await fetch(`${API_URL}?acao=site`, { method:'GET' });
        const json = await resp.json();

        if(!json.ok){
          throw new Error(json.message || 'Falha ao carregar conteúdo.');
        }

        const data = json.data || {};
        const config = data.config || {};
        const banners = data.banners || [];
        const noticias = data.noticias || [];
        const avisos = data.avisos || [];

        document.getElementById('tituloSite').textContent = config.nome_site || 'Fórum CEJ';
        document.getElementById('subtituloSite').textContent = config.subtitulo_site || 'Portal escolar';

        document.getElementById('banners').innerHTML = banners.length
          ? banners.map(item => cardHtml(item.titulo || item.nome, item.descricao || item.texto)).join('')
          : '<div class="card">Nenhum banner cadastrado.</div>';

        document.getElementById('noticias').innerHTML = noticias.length
          ? noticias.map(item => cardHtml(item.titulo, item.resumo || item.descricao)).join('')
          : '<div class="card">Nenhuma notícia cadastrada.</div>';

        document.getElementById('avisos').innerHTML = avisos.length
          ? avisos.map(item => cardHtml(item.titulo, item.descricao || item.texto)).join('')
          : '<div class="card">Nenhum aviso cadastrado.</div>';
      } catch(err){
        showError(err && err.message ? err.message : 'Failed to fetch');
      }
    }

    carregarSite();
  </script>
</body>
</html>
